stages:
  - restore
  - build
  - package
  - deploy_dev
  - deploy_qa
  - deploy_prod

default:
  interruptible: true

variables:
  BUILD_CONFIGURATION: "Release"
  SOLUTION_FILE: "MyApp.sln"
  ARTIFACT_DIR: "package"

# -----------------------------
# 1) BUILD ONCE (Windows runner)
# -----------------------------
restore:
  stage: restore
  tags: [ "windows" ]
  script:
    - nuget restore $env:SOLUTION_FILE
  rules:
    - if: '$CI_COMMIT_BRANCH'

build:
  stage: build
  tags: [ "windows" ]
  script:
    - >
      "C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\MSBuild\Current\Bin\MSBuild.exe"
      $env:SOLUTION_FILE
      /p:Configuration=$env:BUILD_CONFIGURATION
      /m
  artifacts:
    expire_in: 7 days
    paths:
      - "**\bin\Release\"
  rules:
    - if: '$CI_COMMIT_BRANCH'

package:
  stage: package
  tags: [ "windows" ]
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -Command ^
        "New-Item -ItemType Directory -Force $env:ARTIFACT_DIR | Out-Null; ^
         Copy-Item -Recurse -Force .\MyApp\bin\Release\* $env:ARTIFACT_DIR\"
  artifacts:
    expire_in: 7 days
    paths:
      - package/
  rules:
    - if: '$CI_COMMIT_BRANCH'

# -------------------------------------------
# 2) DEPLOY TEMPLATE (per-host, in parallel)
# -------------------------------------------
.deploy_iis_template:
  tags: [ "windows" ]          # run from a Windows runner (recommended)
  dependencies:
    - package                  # fetch the single packaged artifact
  before_script:
    - powershell -NoProfile -ExecutionPolicy Bypass -Command "$PSVersionTable.PSVersion"
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -File deploy\deploy-iis.ps1
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - deploy_logs/
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# -----------------------------
# DEV: parallel per host
# -----------------------------
deploy_dev:
  stage: deploy_dev
  extends: .deploy_iis_template
  parallel:
    matrix:
      - HOST: "dev-iis-01"
      - HOST: "dev-iis-02"
      - HOST: "dev-iis-03"
  variables:
    ENV_NAME: "dev"
  environment:
    name: dev
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.+$/'

# -----------------------------
# QA: parallel per host
# -----------------------------
deploy_qa:
  stage: deploy_qa
  extends: .deploy_iis_template
  parallel:
    matrix:
      - HOST: "qa-iis-01"
      - HOST: "qa-iis-02"
  variables:
    ENV_NAME: "qa"
  environment:
    name: qa
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

# -----------------------------
# PROD: parallel per host + protected + lock
# -----------------------------
deploy_prod:
  stage: deploy_prod
  extends: .deploy_iis_template
  parallel:
    matrix:
      - HOST: "prod-iis-01"
      - HOST: "prod-iis-02"
      - HOST: "prod-iis-03"
  variables:
    ENV_NAME: "prod"
  environment:
    name: production
  when: manual
  allow_failure: false
  resource_group: "prod-iis-deploy"   # prevents overlapping prod deployments
  rules:
    - if: '$CI_COMMIT_TAG'            # deploy prod from tag
